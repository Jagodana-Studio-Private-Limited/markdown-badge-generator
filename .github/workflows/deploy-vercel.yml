name: Deploy Tool to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Tool Info
        run: |
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          SLUG=${REPO_NAME}
          DOMAIN="${SLUG}.tools.jagodana.com"

          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "SLUG=$SLUG" >> $GITHUB_ENV
          echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Link to correct Vercel project
        run: |
          # Remove the base template's project.json so we create/link the correct project
          rm -f .vercel/project.json

          # Link to (or create) the project for this specific tool
          vercel link \
            --yes \
            --project "$REPO_NAME" \
            --scope jagodana-studio-private-limiteds-projects \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true

          cat .vercel/project.json || echo "WARNING: project.json not created"

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Set GA and App URL env vars in Vercel
        run: |
          PROJECT_ID=$(cat .vercel/project.json | jq -r '.projectId')
          ORG_ID=$(cat .vercel/project.json | jq -r '.orgId')

          echo "Setting env vars for project: $PROJECT_ID in org: $ORG_ID"

          # Upsert NEXT_PUBLIC_GA_ID
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${ORG_ID}&upsert=true" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXT_PUBLIC_GA_ID\",\"value\":\"G-4ZFEX1Y93F\",\"type\":\"plain\",\"target\":[\"production\"]}" | jq '.key // .error' || true

          # Upsert NEXT_PUBLIC_APP_URL
          curl -s -X POST \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${ORG_ID}&upsert=true" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXT_PUBLIC_APP_URL\",\"value\":\"https://${DOMAIN}\",\"type\":\"plain\",\"target\":[\"production\"]}" | jq '.key // .error' || true

          # Pull again to load the env vars into the local .vercel/
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV
          echo "Deployment URL: $DEPLOYMENT_URL"

      - name: Fetch Vercel Project ID
        run: |
          PROJECT_ID=$(cat .vercel/project.json | jq -r '.projectId')
          ORG_ID=$(cat .vercel/project.json | jq -r '.orgId')
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "ORG_ID=$ORG_ID" >> $GITHUB_ENV
          echo "Vercel Project ID: $PROJECT_ID"

      - name: Attach Custom Domain
        run: |
          echo "Attaching domain $DOMAIN to project $PROJECT_ID in org $ORG_ID"
          RESPONSE=$(curl -s -X POST \
          "https://api.vercel.com/v10/projects/${PROJECT_ID}/domains?teamId=${ORG_ID}" \
          -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"name":"'"$DOMAIN"'"}')
          echo "Domain attachment response: $RESPONSE"

      - name: Output Deployment Info
        run: |
          echo "Tool deployed successfully!"
          echo "Domain: https://$DOMAIN"
          echo "Deployment URL: $DEPLOYMENT_URL"
          echo "Project ID: $PROJECT_ID"
